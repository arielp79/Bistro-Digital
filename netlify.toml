# Netlify — menú QR (web-client). Este archivo = sitio del MENÚ.
# Admin: segundo sitio → config file `netlify.admin.toml` (ver documentos/Piloto_Online_Restaurante.md).

[build]
  command = "npm install --include=dev && npm run build --workspace=@bistro/shared-types && npm run build --workspace=@bistro/web-client"
  publish = "apps/web-client/dist"

[build.environment]
  NODE_VERSION = "20"
  # VITE_API_URL=https://tu-api.onrender.com

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
