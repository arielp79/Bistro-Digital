# Netlify — menú QR (web-client). Un sitio = este archivo en la raíz.
# Admin: otro sitio Netlify con build override:
#   npm install --include=dev && npm run build --workspace=@bistro/shared-types && npm run build --workspace=@bistro/web-admin
#   publish: apps/web-admin/dist
#   env: VITE_API_URL=https://tu-api.onrender.com

[build]
  command = "npm install --include=dev && npm run build --workspace=@bistro/shared-types && npm run build --workspace=@bistro/web-client"
  publish = "apps/web-client/dist"

[build.environment]
  NODE_VERSION = "20"
  # Site settings → Environment variables (obligatorio):
  # VITE_API_URL=https://tu-api.onrender.com

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
